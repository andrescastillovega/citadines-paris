g at any age, and right by the Ménagerie you’re already visiting. Tip: Closed Tuesdays.", "url": "https://www.google.com/maps/search/?api=1&query=48.84172,2.35605", "category": "Museums & Culture", "olympics": "No", "source": "Plan", "lat": 48.84172, "lon": 2.35605}, {"name": "Parc Floral de Paris (Vincennes)", "video": "", "activity": "Extra idea (if time opens up) — backup — More parks, animals & rides — 12th arr.", "review": "The locals’ family park: enormous playgrounds, a mini-train, peacocks strolling past your picnic blanket. Tip: Pair with a peek at the Château de Vincennes keep next door. Small entry fee (~€3) in season.", "url": "https://www.google.com/maps/search/?api=1&query=48.8377,2.4443", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.8377, "lon": 2.4443}, {"name": "Parc de la Villette", "video": "", "activity": "Extra idea (if time opens up) — backup — More parks, animals & rides — 19th arr.", "review": "Canal-side lawns, follies and the famous dragon slide; combine with Cité des Enfants for a full La Villette day.", "url": "https://www.google.com/maps/search/?api=1&query=48.89316,2.39053", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.89316, "lon": 2.39053}, {"name": "Parc Monceau", "video": "", "activity": "Extra idea (if time opens up) — backup — More parks, animals & rides — 8th arr.", "review": "The prettiest Right-Bank picnic park — colonnade, pond, carousel and a good playground in a chic, calm quartier.", "url": "https://www.google.com/maps/search/?api=1&query=48.87968,2.30896", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.87968, "lon": 2.30896}, {"name": "Canal cruise through the vault (Canauxrama)", "video": "", "activity": "Extra idea (if time opens up) — backup — More parks, animals & rides — from Bastille", "review": "Locks, low bridges and the eerie lamp-lit tunnel under Bastille — a completely different Paris from the water. Tip: ~2.5 h: best if she naps aboard.", "url": "https://www.google.com/maps/search/?api=1&query=48.85138,2.36861", "category": "Entertainment & Events", "olympics": "No", "source": "Plan", "lat": 48.85138, "lon": 2.36861}, {"name": "Musée Rodin — the garden", "video": "", "activity": "Extra idea (if time opens up) — backup — Grown-up beauties that tolerate a toddler — 7th arr.", "review": "The Thinker among the roses: a garden-only ticket, a café, and lawns where small legs can safely orbit the sculpture. Tip: Closed Mondays.", "url": "https://www.google.com/maps/search/?api=1&query=48.85531,2.31584", "category": "Museums & Culture", "olympics": "No", "source": "Plan", "lat": 48.85531, "lon": 2.31584}, {"name": "Sainte-Chapelle", "video": "", "activity": "Extra idea (if time opens up) — backup — Grown-up beauties that tolerate a toddler — 1st arr. (Île de la Cité)", "review": "The stained-glass jewel box we left off the main route because strollers must fold — thirty minutes of pure wow if you go at opening. Tip: Timed tickets online; pairs with your Notre-Dame morning.", "url": "https://www.google.com/maps/search/?api=1&query=48.85537,2.34496", "category": "Landmarks & Areas", "olympics": "No", "source": "Plan", "lat": 48.85537, "lon": 2.34496}, {"name": "Giverny — Monet’s gardens", "video": "", "activity": "Extra idea (if time opens up) — backup — With a spare half-day — day trip", "review": "45 min by train from Saint-Lazare + shuttle: the lily pond and late-summer dahlias in full riot. Open through Nov 1. Tip: Book train + timed entry ahead; go early.", "url": "https://www.google.com/maps/search/?api=1&query=49.07538,1.5337", "category": "Museums & Culture", "olympics": "No", "source": "Plan", "lat": 49.07538, "lon": 1.5337}, {"name": "Marché d’Aligre", "video": "", "activity": "Extra idea (if time opens up) — backup — With a spare half-day — 12th arr.", "review": "Paris’s liveliest cheap market morning: fruit mountains, flea-market tables, and an oyster-bar reward for the adults. Tip: Tue–Sun until ~13:00.", "url": "https://www.google.com/maps/search/?api=1&query=48.84911,2.37782", "category": "Shopping & Services", "olympics": "No", "source": "Plan", "lat": 48.84911, "lon": 2.37782}, {"name": "Deyrolle", "video": "", "activity": "Extra idea (if time opens up) — backup — With a spare half-day — 7th arr.", "review": "The 1831 taxidermy cabinet of curiosities on rue du Bac — ten minutes of open-mouthed staring, zero admission. Tip: Closed Sundays & Tuesdays.", "url": "https://www.google.com/maps/search/?api=1&query=48.85653,2.32642", "category": "Shopping & Services", "olympics": "No", "source": "Plan", "lat": 48.85653, "lon": 2.32642}, {"name": "Pont Neuf", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Seen from the Seine cruise", "review": "Rick Steves: Despite its name — 'New Bridge' — it's actually the oldest bridge in Paris: from 1607, the first stone bridge crossing the Seine. (The trip plan's Square du Vert-Galant sits right below it.)", "url": "https://www.google.com/maps/search/?api=1&query=Pont%20Neuf%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.8566, "lon": 2.3414}, {"name": "Île de la Cité", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Cruising past and visiting Notre-Dame", "review": "Rick Steves: The island in the middle of the Seine where the city was born: centuries before Christ, the Romans conquered a local fishing tribe called the Parisii here and founded a city named for them — Paris. Notre-Dame was built on the island upon the ruins of a Roman temple.", "url": "https://www.google.com/maps/search/?api=1&query=%C3%8Ele%20de%20la%20Cit%C3%A9%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.855, "lon": 2.3472}, {"name": "Île Saint-Louis", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Strolling the petite residential island", "review": "Rick Steves: The little sister of the Île de la Cité, just upstream and connected by a cute pedestrian bridge. Smaller and more residential, it's a reminder that even the historic core of Paris is a collection of neighborhoods — and a first taste of the city's joie de vivre, from thriving bistros to decadent ice-cream shops (the plan's Berthillon is here) to families and friends gathering on the banks of the river.", "url": "https://www.google.com/maps/search/?api=1&query=%C3%8Ele%20Saint-Louis%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.8517, "lon": 2.3572}, {"name": "Parc Rives de Seine / Paris Plages", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Joining Parisians on the car-free riverbanks on a summer evening: picnic dinners, dancing, and the urban beach", "review": "Rick Steves: Centuries ago the banks of the Seine were miserable mud, like a mucky cesspool; the embankments were built in the 1800s, and today the renovated banks are thriving — 'a great equalizer where all citizens can enjoy a waterfront perch'. Summer evenings bring out crowds young and old for picnics and impromptu dancing, 'like an impromptu music festival'. The once-busy riverside expressways are now closed to cars, and each summer the city trucks in potted palm trees, hammocks, lounge chairs and 2,000 tons of sand to create Paris Plages — a virtual riviera in the city center.", "url": "https://www.google.com/maps/search/?api=1&query=Parc%20Rives%20de%20Seine%2C%20Paris", "category": "Parks & Nature", "olympics": "No", "source": "Video", "lat": 48.8553, "lon": 2.3512}, {"name": "Rue Cler (market street)", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Shopping for a dinner party with his Parisian friend Nathalie: produce, butcher, cheese shop, wine shop, bakery and flowers", "review": "Rick Steves: Each Paris neighborhood has a market street that gives it small-town charm; his advice for an overwhelming city is to choose a neighborhood and make it home. On Rue Cler a whole dinner-party menu comes together shop by shop. Nathalie's lessons: French food shopping is 'almost like a religion' about seasonal flavor (no tomatoes in winter — they're tasteless; most produce comes from the surrounding Île-de-France); ask the butcher for cooking advice (lamb chops: 2–3 minutes per side for rosé); 'in a French meal you really have to have cheese' (she picks a truffled Camembert and a 24-month Comté — older means more flavor); pick the right wine for each course (a light red for the lamb, something more robust — a Médoc — for the cheese); finish with a fresh-baked baguette and a bouquet of flowers for the table. The plan's Café du Marché and Le Petit Cler are on this street.", "url": "https://www.google.com/maps/search/?api=1&query=Rue%20Cler%2C%20Paris", "category": "Shopping & Services", "olympics": "No", "source": "Video", "lat": 48.8563, "lon": 2.3054}, {"name": "Place de la Bastille", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Visiting the square where the French Revolution began", "review": "Rick Steves: The French Revolution was launched here in 1789 with the storming of the notorious Bastille prison — angry Parisians released its prisoners and tore it down. Today it's 'one of Europe's great non-sights': nothing is left to see, but all around is the modern city that followed the revolution, designed not for kings but for people — Baron Haussmann's grand boulevards lined with stately buildings, uniform facades, wrought-iron balconies and iconic slate rooftops.", "url": "https://www.google.com/maps/search/?api=1&query=Place%20de%20la%20Bastille%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.8532, "lon": 2.3692}, {"name": "Coulée verte René-Dumont (Promenade plantée; not named in the video)", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Shown as an example of Paris turning old elevated rail lines into parks", "review": "Rick Steves: Rick shows how Paris keeps getting greener and more livable: pedestrian zones, favoring bikes and public transit over cars, and 'even turning elevated rail lines of the Industrial Age into skinny greenbelts high above street level, ideal for bikers and strollers'. This elevated park running from near Bastille toward Vincennes is the classic example (the video doesn't name it).", "url": "https://www.google.com/maps/search/?api=1&query=Coul%C3%A9e%20verte%20Ren%C3%A9-Dumont%2C%20Paris", "category": "Parks & Nature", "olympics": "No", "source": "Video", "lat": 48.8493, "lon": 2.3719}, {"name": "Panthéon", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Seen at the end of one of the grand boulevards", "review": "Rick Steves: Like a citywide game of connect-the-dots, wide Parisian boulevards lead to famous landmarks — like the Panthéon, built to honor illustrious Parisians.", "url": "https://www.google.com/maps/search/?api=1&query=Panth%C3%A9on%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.8462, "lon": 2.3464}, {"name": "Latin Quarter (Quartier Latin)", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Evening wandering of the characteristic lanes", "review": "Rick Steves: The characteristic lanes of the Latin Quarter thrive after dark with a fun-loving energy popular with tourists — including jazz clubs: jazz was the rage between the wars thanks to American soldiers, and there are still jazz clubs everywhere.", "url": "https://www.google.com/maps/search/?api=1&query=Quartier%20Latin%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.8534, "lon": 2.3438}, {"name": "Caveau de la Huchette (jazz club)", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Grooving with the locals at an underground jazz club — Steve Smith's favorite", "review": "Rick Steves: A well-established haunt that fills a centuries-old cellar with lovers of jazz and dance, where locals and tourists alike mix it up — live jazz and frenzied dancing. The club isn't named on screen, but the official episode page identifies it as Caveau de la Huchette in the Latin Quarter.", "url": "https://www.google.com/maps/search/?api=1&query=Caveau%20de%20la%20Huchette%2C%20Paris", "category": "Entertainment & Events", "olympics": "No", "source": "Video", "lat": 48.8531, "lon": 2.3461}];

const ICONS = {
 "Food & Drink":"🍽️","Museums & Culture":"🏛️","Landmarks & Areas":"🗼","Parks & Nature":"🌳",
 "Entertainment & Events":"🎭","Shopping & Services":"🛍️","Hotels":"🛏️","Transit & Walks":"🚶"};
const icon = c => ICONS[c] || "📍";

/* ---------- map ---------- */
const map = L.map('map', {zoomControl:false, attributionControl:true});
const CARTO = '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/attributions">CARTO</a>';
const bases = {
  voyager: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {attribution:CARTO, subdomains:'abcd', maxZoom:20}),
  gray:    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {attribution:CARTO, subdomains:'abcd', maxZoom:20})
};
bases.voyager.addTo(map);

/* ---------- markers ---------- */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function parts(s){return s.split(' | ').map(esc);}
function recs(p){
  const r = [];
  if (p.source==='Plan' || p.source==='Both') r.push({k:'plan', c:'var(--accent)', t:'Trip plan'});
  if (/Alan/.test(p.video))        r.push({k:'alan', c:'var(--video)', t:"Alan x el mundo"});
  if (/Rick Steves/.test(p.video)) r.push({k:'rick', c:'var(--rick)',  t:'Rick Steves'});
  return r;
}
function ring(p){
  const r = recs(p), seg = 100/r.length;
  return `conic-gradient(from -45deg,${r.map((x,i)=>`${x.c} ${i*seg}% ${(i+1)*seg}%`).join(',')})`;
}
function popupHtml(p){
  const act = parts(p.activity), rev = parts(p.review);
  const actHtml = act.length>1 ? '<ul><li>'+act.join('</li><li>')+'</li></ul>' : act[0];
  const revHtml = rev.length>1 ? '<ul><li>'+rev.join('</li><li>')+'</li></ul>' : rev[0];
  const oly = p.olympics!=='No' ? '<span class="chip oly">⚠ Olympic-era details</span>' : '';
  return `<div class="pp">
    <h4>${icon(p.category)} ${esc(p.name)}</h4>
    <div class="chips"><span class="chip">${esc(p.category)}</span>
      ${recs(p).map(x=>`<span class="chip src src-${x.k}">${x.t}</span>`).join('')}${oly}</div>
    <h5>Activity</h5><div class="txt">${actHtml}</div>
    <h5>Notes & review</h5><div class="txt rev">${revHtml}</div>
    <button class="more" style="display:none">Show more</button>
    <a class="gmap" href="${p.url}" target="_blank" rel="noopener">Open in Google Maps ↗</a>
  </div>`;
}
const markers = PLACES.map(p => {
  const m = L.marker([p.lat, p.lon], {
    icon: L.divIcon({className:'', html:`<div class="pin" style="--ring:${ring(p)}">${icon(p.category)}</div>`,
                     iconSize:[34,34], iconAnchor:[17,32], popupAnchor:[0,-30]}),
    title: p.name
  }).bindPopup(popupHtml(p), {maxWidth:320});
  m._place = p;
  return m;
});
map.on('popupopen', e => {
  const el = e.popup.getElement().querySelector('.rev');
  const btn = e.popup.getElement().querySelector('.more');
  if (el && el.scrollHeight > el.clientHeight + 6){
    el.classList.add('clamp'); btn.style.display='inline';
    btn.onclick = () => { const open = el.classList.toggle('open');
      btn.textContent = open ? 'Show less' : 'Show more'; };
  }
});

/* ---------- filtering ---------- */
const cats = [...new Set(PLACES.map(p=>p.category))];
cats.sort((a,b)=>PLACES.filter(p=>p.category===b).length - PLACES.filter(p=>p.category===a).length || a.localeCompare(b));
const active = new Set(cats);
const catsDiv = document.getElementById('cats');
cats.forEach(c => {
  const n = PLACES.filter(p=>p.category===c).length;
  const l = document.createElement('label');
  l.className = 'cat';
  l.innerHTML = `<input type="checkbox" checked data-cat="${esc(c)}"><span class="ico">${icon(c)}</span><span class="nm">${esc(c)}</span><span class="ct">${n}</span>`;
  catsDiv.appendChild(l);
});
function refresh(){
  const showVideo = document.getElementById('vidToggle').checked;
  let n = 0;
  markers.forEach(m => {
    const p = m._place;
    const ok = active.has(p.category) && (showVideo || p.source !== 'Video');
    if (ok && !map.hasLayer(m)) m.addTo(map);
    if (!ok && map.hasLayer(m)) m.removeFrom(map);
    if (ok) n++;
  });
  document.getElementById('count').textContent = `${n} places`;
  document.getElementById('fabn').textContent = n;
}
catsDiv.addEventListener('change', e => {
  const c = e.target.dataset.cat;
  e.target.checked ? active.add(c) : active.delete(c);
  refresh();
});
document.getElementById('allCats').onclick = () => { active.clear(); cats.forEach(c=>active.add(c));
  catsDiv.querySelectorAll('input').forEach(i=>i.checked=true); refresh(); };
document.getElementById('noCats').onclick = () => { active.clear();
  catsDiv.querySelectorAll('input').forEach(i=>i.checked=false); refresh(); };
document.getElementById('vidToggle').onchange = refresh;

/* ---------- controls ---------- */
document.getElementById('zin').onclick  = () => map.zoomIn();
document.getElementById('zout').onclick = () => map.zoomOut();
document.querySelectorAll('.baseopt').forEach(b => b.onclick = () => {
  document.querySelectorAll('.baseopt').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  Object.values(bases).forEach(l=>map.removeLayer(l));
  bases[b.dataset.base].addTo(map);
});
const panel = document.getElementById('panel');
document.getElementById('fab').onclick = () => panel.classList.add('open');
document.getElementById('closePanel').onclick = () => panel.classList.remove('open');
map.on('click', () => panel.classList.remove('open'));

/* ---------- initial view: fit Paris pins, everything reachable by zoom-out ---------- */
const parisPins = PLACES.filter(p => p.lat > 48.79 && p.lat < 48.95 && p.lon > 2.2 && p.lon < 2.48);
map.fitBounds(L.latLngBounds(parisPins.map(p=>[p.lat,p.lon])), {padding:[40,40]});
refresh();
</script>
</body>
</html>
