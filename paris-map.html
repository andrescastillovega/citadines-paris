ng the walking tour", "review": "Bust of Dalida, a singer born in Egypt to an Italian family who became hugely famous in France - the Ariana Grande of her era, per Alan - and sang in many languages. She lived in this neighborhood, in a house where she took her own life at 54 after three attempts. Visitors rub the bust's breasts, though he says there is no real historical reason or legend behind it - just an excuse.", "url": "https://www.google.com/maps/search/?api=1&query=Place%20Dalida%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.888507, "lon": 2.33814}, {"name": "Viñedo de Montmartre", "video": "MONTMARTRE Y MÁS SECRETOS DE PARÍS ｜ París #5 Alan por el mundo", "activity": "Viewing the vineyard during the walking tour", "review": "A remnant of old Montmartre: there used to be several vineyards on the hill, but only this one remains, fortunately preserved as a historical legacy. It still produces wine; every September the bottles are auctioned and the money is donated to charity.", "url": "https://www.google.com/maps/search/?api=1&query=Clos%20Montmartre%2C%20Rue%20des%20Saules%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.888186, "lon": 2.339834}, {"name": "La Casa Rosa", "video": "MONTMARTRE Y MÁS SECRETOS DE PARÍS ｜ París #5 Alan por el mundo", "activity": "Walking past during the tour", "review": "The famous pink house, a former meeting place of artists.", "url": "https://www.google.com/maps/search/?api=1&query=La%20Maison%20Rose%2C%202%20Rue%20de%20l%27Abreuvoir%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8877, "lon": 2.3389}, {"name": "La Bonne Franquette", "video": "MONTMARTRE Y MÁS SECRETOS DE PARÍS ｜ París #5 Alan por el mundo", "activity": "Walking past during the tour", "review": "Legendary restaurant frequented by Pissarro, Degas, Cezanne, Toulouse-Lautrec, Renoir and Monet - the cream of the Impressionist art scene of that era.", "url": "https://www.google.com/maps/search/?api=1&query=La%20Bonne%20Franquette%2C%202%20Rue%20des%20Saules%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8866, "lon": 2.3405}, {"name": "Place du Tertre", "video": "MONTMARTRE Y MÁS SECRETOS DE PARÍS ｜ París #5 Alan por el mundo", "activity": "Video #5: Walking through the square and filming the artists at work | Plan: Itinerary — see & do — Day 5 · Fri Sep 4 — 10:00", "review": "Video #5: Montmartre's main square, full of artists from different parts of the world selling their art, paintings, or doing caricatures. Interesting detail: the artists must pass a drawing exam and register as self-employed workers; only 100 permits exist, and one is freed only when an artist retires or dies. | Plan: Portrait artists setting up, an accordion somewhere. Loop down rue de l'Abreuvoir (the pretty one) past the Wall of I-Love-Yous at Abbesses. Tip: A carousel and public toilets wait at the bottom of the hill — engineering.", "url": "https://www.google.com/maps/search/?api=1&query=48.88657,2.34083", "category": "Landmarks & Areas", "olympics": "No", "source": "Both", "lat": 48.88657, "lon": 2.34083}, {"name": "Basílica del Sagrado Corazón (Sacré-Cœur)", "video": "MONTMARTRE Y MÁS SECRETOS DE PARÍS ｜ París #5 Alan por el mundo", "activity": "Video #5: Visiting the exterior and the viewpoint; skipped going inside because of the queue (he has been inside before) | Plan: Itinerary — see & do — Day 5 · Fri Sep 4 — 09:15", "review": "Video #5: A very, very beautiful church - in his opinion prettier outside than inside. Free to enter: French law does not allow churches to charge visitors, so all churches in France are free. Expect queues of about half an hour to get in. From the top there is a superb view of Paris. It was extremely crowded when he visited; be careful with pickpockets and with the people trying to put bracelets on you - it is all a scam. If you cannot climb the stairs, there is a funicular and also a little train for the elderly or people with disabilities. The whole hill is covered in love locks, since they are no longer allowed on the Pont des Arts where they originally hung. | Plan: Free entry, golden mosaics, and the best panorama in Paris while the steps are still quiet. Keep bags zipped out front.", "url": "https://www.google.com/maps/search/?api=1&query=48.8867,2.3431", "category": "Landmarks & Areas", "olympics": "No", "source": "Both", "lat": 48.8867, "lon": 2.3431}, {"name": "Cabaret parisino (name not said in the video; described as the first cabaret of Paris)", "video": "MONTMARTRE Y MÁS SECRETOS DE PARÍS ｜ París #5 Alan por el mundo", "activity": "Having dinner and watching the cabaret show with his friend Cristian", "review": "Considered the first cabaret in Paris; it burned down at the end of the 1800s and Napoleon Bonaparte ordered it rebuilt, according to his friend Cristian. Not in Montmartre, but one of the great Parisian cabarets. Two options: show only, or dinner plus show (he did dinner and show, with wine and champagne). A free pre-show runs while dinner is served, with a singer he says is very good. The dinner was very tasty - the meat especially good - and the dessert menu includes a 'French kiss'. Filming the main show was not allowed. He liked it a lot and recommends closing your Paris day with a cabaret show.", "url": "https://www.google.com/maps/search/?api=1&query=Paradis%20Latin%2C%2028%20Rue%20du%20Cardinal%20Lemoine%2C%20Paris", "category": "Entertainment & Events", "olympics": "No", "source": "Video", "lat": 48.8482, "lon": 2.3524}, {"name": "Le Marais (lemar)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo | Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Walking around and filming the neighborhood for the whole day | Rick Steves: Walking the neighborhood with his friend and fellow tour guide Thierry Gauduchon, who lives here", "review": "One of his favorite neighborhoods in Paris: artistic, full of history, museums, pretty squares, food, shops and street art. In the 1960s it was the dirtiest, most insalubrious district of Paris; from the 1970s artists and intellectuals rehabilitated it (centuries earlier the nobility lived there). It is officially the LGBT district and also the Jewish quarter of Paris. Historic shop signs cannot be modified even if the store inside changes. Great for escaping souvenir shops and finding local designers. He recommends spending a morning, an afternoon, a full day or several days. Living there is very expensive: a ~20 m2 studio costs roughly 1,500 EUR per month. | Rick Steves: A typical, classical Paris neighborhood — once a mucky slum ('marais' means swamp), drained and gentrified in the 17th century by King Henry IV, and now 'the place to be'. Thierry calls it 'bobo': bourgeois + bohemian — if it's cheap it attracts the bobo, then it becomes trendy. Historically the oldest Jewish neighborhood of Paris (Jews settled here when the swamp was the cheapest real estate); a couple of the old delis remain among today's trendy boutiques. Great for window-shopping — the French say 'lèche-vitrine', literally 'licking the window'.", "url": "https://www.google.com/maps/search/?api=1&query=Le%20Marais%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.860382, "lon": 2.360742}, {"name": "Panadería de la praluline (bakery name not said in the video)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Eating his favorite bread (praluline) for breakfast", "review": "His favorite bread in Paris, almost in the world — he strongly recommends it. The praluline (brioche with caramelized almonds and nuts) was created by accident in 1948, and its inventor won France's best-craftsman award. Famous, multi-award-winning bakery; many of its pastries have won prizes and it uses mill-ground (non-industrialized) flours of better quality.", "url": "https://www.google.com/maps/search/?api=1&query=Maison%20Pralus%2C%2035%20Rue%20Rambuteau%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8613, "lon": 2.3535}, {"name": "Archives de la Nation (los archivos de la nación)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Pointed out from outside; can be visited (he did not go in)", "review": "Holds unique documents such as Napoleon's will and the hunting book of Louis X; it is open to visitors.", "url": "https://www.google.com/maps/search/?api=1&query=Archives%20Nationales%2C%2060%20Rue%20des%20Francs-Bourgeois%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.86045, "lon": 2.357812}, {"name": "Musée de la Chasse et de la Nature (museo de la caza y la naturaleza)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Touring the museum and filming the exhibits", "review": "He loves this museum — calls it incredible and likes it more than many famous Paris museums; it is the ONE museum he would recommend in Le Marais. Housed in two old Marais buildings, it explores the relationship between humans and animals through time: hunting weapons that are works of art, taxidermy, historic pieces mixed with contemporary art and even animatronics. Feels like entering a collector's cabinet of curiosities (marine-mammal tusks once sold as real unicorn horns, a house made of feathers, a color-sorted library). Not an apology for hunting but an invitation to reflect on how we relate to animals.", "url": "https://www.google.com/maps/search/?api=1&query=Mus%C3%A9e%20de%20la%20Chasse%20et%20de%20la%20Nature%2C%2062%20Rue%20des%20Archives%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.861256, "lon": 2.358783}, {"name": "Chocolaterie Patrick Roger", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Tasting four chocolates (foodie stop)", "review": "Very prestigious French chocolatier famous for spectacular chocolate sculptures; rumored to open his own museum soon. The shop is gorgeous, very popular, with beautiful packaging. He liked everything he tried (caramel with berries, Guinness beer, lemongrass-mint — the first mint chocolate he has ever liked — and ginger with Sichuan pepper). Recommends a stroll through the shop; jokes that if you buy chocolates as gifts you will eat them before getting home.", "url": "https://www.google.com/maps/search/?api=1&query=Patrick%20Roger%2C%2043%20Rue%20des%20Archives%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8602, "lon": 2.3575}, {"name": "Estudio de maquetas de Renzo Piano", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Pointed out while walking through Le Marais", "review": "The workshop where the architectural models of Renzo Piano are made. Piano is one of the best architects in the world and one of Alan's favorites; he co-designed the Centre Pompidou with Richard Rogers.", "url": "https://www.google.com/maps/search/?api=1&query=Renzo%20Piano%20Building%20Workshop%2C%2034%20Rue%20des%20Archives%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.8589, "lon": 2.3564}, {"name": "Dunes Blanches (\"dunas blancas\", choux pastry shop)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Eating a choux (cream-filled pastry)", "review": "Shop specializing in choux, small buns filled with pastry cream (he cannot pronounce the French name). He enjoyed it — his third treat within two blocks; jokes about how much sugar he is eating.", "url": "https://www.google.com/maps/search/?api=1&query=Dunes%20Blanches%20chez%20Pascal%2C%20Le%20Marais%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8582, "lon": 2.3585}, {"name": "Pierre Hermé", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Recommended only (not visited on camera) — go for the macarons", "review": "Macarons are the specialty. According to his friend Federico they are even better than Ladurée's. There are several branches all over Paris — if you cross one, go in and try them.", "url": "https://www.google.com/maps/search/?api=1&query=Pierre%20Herm%C3%A9%2C%2018%20Rue%20Sainte-Croix%20de%20la%20Bretonnerie%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8578, "lon": 2.3559}, {"name": "Trudon", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Browsing the candle shop", "review": "Shop selling beeswax candles like the ones once made to light the banquets of Versailles. He recommends it as a very good souvenir of your visit to Paris — the candles smell delicious, and diffusers are also available.", "url": "https://www.google.com/maps/search/?api=1&query=Trudon%2C%2011%20Rue%20Sainte-Croix%20de%20la%20Bretonnerie%2C%20Paris", "category": "Shopping & Services", "olympics": "No", "source": "Video", "lat": 48.8577, "lon": 2.3563}, {"name": "Mariage Frères (said as \"marf\", traditional tea house)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Visiting the tea house and its upstairs tea museum", "review": "A very traditional tea house in Paris: it has a tea salon where you can have a cup, a shop to buy tea to take home, and upstairs a free-to-browse tea museum explaining the whole history of tea (teapots, how tea was transported, tea types). He recommends going in if you like tea — his motto: enter any place that catches your eye rather than staying with the doubt.", "url": "https://www.google.com/maps/search/?api=1&query=Mariage%20Fr%C3%A8res%2C%2030%20Rue%20du%20Bourg-Tibourg%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8573, "lon": 2.3557}, {"name": "Sinagoga asquenazí de Le Marais (Art Nouveau)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Viewing from outside while walking", "review": "Ashkenazi synagogue in the Jewish quarter, designed with Art Nouveau architecture, which makes it unique. Most people walk past without noticing it, but he says this place is special.", "url": "https://www.google.com/maps/search/?api=1&query=Synagogue%20de%20la%20rue%20Pav%C3%A9e%2C%2010%20Rue%20Pav%C3%A9e%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.8567, "lon": 2.3611}, {"name": "L'As du Fallafel", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Video #4: Pointed out (closed that day); recommends eating there | Plan: Itinerary — eat — Day 4 · Thu Sep 3 — 11:30 | Plan: Restaurant — € — Le Marais & the Islands — days 4 & 7", "review": "Video #4: The famous falafel stand of the Jewish quarter. It was closed because it was Saturday (no work that day), but normally there is a long line. He tried the falafel on a previous visit and confirms they are good — but warns that if the queue is more than half an hour, it is not worth the wait. | Plan: The rue des Rosiers legend (closed Saturdays — hence today). Take the 'special' to a bench; you'll do the Marais properly on Sunday. | Plan: The rue des Rosiers legend. Take the 'special' to a Place des Vosges bench. Tip: Closed Saturdays; the line always moves.", "url": "https://www.google.com/maps/search/?api=1&query=48.85741,2.3592", "category": "Food & Drink", "olympics": "No", "source": "Both", "lat": 48.85741, "lon": 2.3592}, {"name": "Uniqlo Le Marais", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Recommended stop shown while walking ('don't forget to visit')", "review": "The store occupies a former metal foundry and still preserves the furnace and some original elements — worth seeing.", "url": "https://www.google.com/maps/search/?api=1&query=Uniqlo%20Le%20Marais%2C%2039%20Rue%20des%20Francs-Bourgeois%2C%20Paris", "category": "Shopping & Services", "olympics": "No", "source": "Video", "lat": 48.857764, "lon": 2.359946}, {"name": "Mercado de pulgas de Le Marais (flea market)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Browsing the market stalls", "review": "He happened upon market day: vintage clothing, some antiques, a bit of everything. Tip: if you run into one of these street markets, take advantage — you may find something interesting.", "url": "https://www.google.com/maps/search/?api=1&query=Le%20Marais%2C%20Paris", "category": "Shopping & Services", "olympics": "No", "source": "Video", "lat": 48.860382, "lon": 2.360742}, {"name": "Le kiosque (conserjería del barrio)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Stopping to look and explaining how it works", "review": "He loved this concept: a neighborhood concierge kiosk that some Paris districts have. They can find you someone to clean your house, do carpentry or plumbing, and you can even leave your house keys there when you go away. He wishes his own neighborhood had one.", "url": "https://www.google.com/maps/search/?api=1&query=Lulu%20dans%20ma%20rue%2C%20Place%20Saint-Paul%2C%20Paris", "category": "Shopping & Services", "olympics": "No", "source": "Video", "lat": 48.8549, "lon": 2.361}, {"name": "Iglesia de San Pablo y San Luis (Saint-Paul-Saint-Louis)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Visiting the church", "review": "Worth stopping to see; declared a historic monument (he dates it to the 15th century in the video). The holy-water fonts made of shells were a gift from Victor Hugo, because his daughter was married in this church.", "url": "https://www.google.com/maps/search/?api=1&query=%C3%89glise%20Saint-Paul-Saint-Louis%2C%2099%20Rue%20Saint-Antoine%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.8547, "lon": 2.3616}, {"name": "Tienda de quesos junto a la iglesia (name not said in the video)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Tasting and buying cheese", "review": "Cheese shop next to the Saint-Paul church whose owner won the best-craftsman-of-France award for cheese. Cheeses from cow, goat and sheep milk. He tastes a Corsican sheep cheese left for weeks in a humid cellar until covered in mold — it looks alarming but he says it is delicious ('premio delicioso'); you won't die, except of happiness.", "url": "https://www.google.com/maps/search/?api=1&query=Fromagerie%20Laurent%20Dubois%2C%2097%20Rue%20Saint-Antoine%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8547, "lon": 2.362}, {"name": "Hôtel de Sully (hotel de zul)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Walking through the mansion, its orangerie and the secret passage", "review": "Useful tip: in French 'hôtel' can mean hospital, city hall, a lodging hotel or a mansion (palacete) — this one is a mansion. It belonged to a rich man who lived there only three weeks before gambling it away; the decoration is very beautiful. The orangerie opposite stored citrus trees and plants in winter (owning one meant you were rich). A 'secret passage' through a small door leads directly to Place des Vosges.", "url": "https://www.google.com/maps/search/?api=1&query=H%C3%B4tel%20de%20Sully%2C%2062%20Rue%20Saint-Antoine%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.8545, "lon": 2.3644}, {"name": "Place des Vosges", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo | Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Video #4: Relaxing, sitting on a bench and enjoying the square | Plan: Itinerary — see & do — Day 7 · Sun Sep 6 — 15:30 | Rick Steves: Visiting the square during the Marais walk with local guide Thierry Gauduchon", "review": "Video #4: His favorite square in ALL of Paris and the prettiest in Le Marais. Surrounded by buildings that look like a single one, but each roof section with its chimney belonged to one family; still one of the most expensive places to live in Paris — home to politicians and the very wealthy. Around the square there are antique and art galleries, hotels and small restaurants. His tip: on a nice day, bring the bread or chocolates you bought nearby, sit on a bench, rest and enjoy. | Plan: Paris's oldest square: pink-brick arcades, fountains, lawn time. The Carnavalet museum (history of Paris) is free, and its courtyards and old shop-sign gallery are surprisingly toddler-durable. Marais shops actually open on Sundays. | Rick Steves: With King Henry IV's support, Place des Vosges became the centerpiece of what was the finest neighborhood in town. The park-like square is a reminder that Paris is more than a collection of world-class museums — for millions it's home: a place to raise a family, enjoy a relaxed retirement, or rendezvous with a lover.", "url": "https://www.google.com/maps/search/?api=1&query=48.85561,2.36553", "category": "Landmarks & Areas", "olympics": "No", "source": "Both", "lat": 48.85561, "lon": 2.36553}, {"name": "Casa de Víctor Hugo (museum on Place des Vosges)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Pointed out from the square (not visited)", "review": "Victor Hugo lived on the corner of Place des Vosges and his home has been converted into a museum.", "url": "https://www.google.com/maps/search/?api=1&query=Maison%20de%20Victor%20Hugo%2C%206%20Place%20des%20Vosges%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.854799, "lon": 2.366136}, {"name": "Musée Carnavalet", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Touring the museum (featured segment)", "review": "Recently renovated; set in two beautiful historic buildings and a museum since 1880, making it one of the oldest museums in Paris. Through art and objects (a collection of over half a million pieces, about 3,800 on display) it tells the history of Paris from prehistory to today. He says it is worth visiting to better understand the city — and admission is free.", "url": "https://www.google.com/maps/search/?api=1&query=Mus%C3%A9e%20Carnavalet%2C%2023%20Rue%20de%20S%C3%A9vign%C3%A9%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.8577, "lon": 2.3626}, {"name": "Musée Picasso", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Touring the museum (featured segment)", "review": "One of the most popular museums in the city. Holds 5,000 Picasso works plus tens of thousands of documents and personal items, many donated by his daughter thanks to a French law that allows paying inheritance tax with important artworks; it also exhibits works by other artists that were part of Picasso's private collection. Practical tip: buy tickets in advance online.", "url": "https://www.google.com/maps/search/?api=1&query=Mus%C3%A9e%20national%20Picasso-Paris%2C%205%20Rue%20de%20Thorigny%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.85987, "lon": 2.362115}, {"name": "Cementerio Père-Lachaise (perlés)", "video": "Mi barrio favorito en París ｜ Guía de París #4 Alan por el mundo", "activity": "Taking a walking tour of the cemetery", "review": "The most famous cemetery in Paris, about 10 minutes from Le Marais; free to visit. 800,000 people are buried in 70,000 tombs (family and individual). Fun fact: Parisians initially rejected it, so the government transferred remains of famous people to give it prestige. Two reasons to visit: the famous graves (fans come to pay tribute) and the high artistic value of the tombs; on nice days Parisians use it like a park to read and stroll. It can be wandered freely, but it is big — better to plan what you want to see, use the maps at the entrance to trace a route to the best-known tombs, or go with a guide. Tombs he highlights: Héloïse and Abélard (the 'cursed lovers', its oldest residents), Rossini, Molière, Gilbert Bécaud, a French singer-actor whose tomb is covered in kisses, Gaspard Ulliel, Tignous (Charlie Hebdo attack victim) and a Bataclan victim, Victor Noir (fertility ritual: put a flower in his hat and rub the statue), Allan Kardec, Édith Piaf, Jim Morrison (now fenced off after so much vandalism; fans still leave gum and offerings) and Oscar Wilde (spectacular tomb now protected by glass covered in kisses — tradition says kissing it brings luck in love; even a 12,000 fine did not stop people).", "url": "https://www.google.com/maps/search/?api=1&query=Cimeti%C3%A8re%20du%20P%C3%A8re-Lachaise%2C%20Paris", "category": "Landmarks & Areas", "olympics": "No", "source": "Video", "lat": 48.86113, "lon": 2.394009}, {"name": "Hôtel Peninsula Paris", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Staying overnight in a Junior Suite, touring the hotel and its grand suites, filming", "review": "Luxury hotel from the Peninsula group (born in Hong Kong, 10 hotels worldwide) that opened in Paris in 2014 in the renovated historic Hotel Majestic, celebrating its 10th anniversary. Full of art and history: first seat of UNESCO, founding place of the League of Nations, and the room where the Paris Peace Treaties were signed (ending the Vietnam War in 1973 and the Cambodia-Vietnam/Khmer Rouge conflict in 1991). 220 rooms with every luxury; his Junior Suite had a fully stocked desk, a walk-in closet \"the size of a whole room in other Paris hotels\", a great bathtub and a terrace, plus welcome amenities (chocolate Eiffel Tower, macaron, fruit, the Peninsula's own champagne). Excellent location: Arc de Triomphe on one side, Eiffel Tower on the other. One of the three spectacular grand suites, the Historic Suite, was the residence of Isabel de Castilla, Queen of Spain. Tip: the hotel rents a small terrace with the Eiffel Tower as backdrop for a romantic proposal dinner - he calls it a great spot to propose.", "url": "https://www.google.com/maps/search/?api=1&query=The%20Peninsula%20Paris%2C%2019%20Avenue%20Kl%C3%A9ber%2C%20Paris", "category": "Hotels", "olympics": "No", "source": "Video", "lat": 48.871, "lon": 2.2932}, {"name": "Galeries Lafayette", "video": "París VIP ｜ Alan por el mundo París #7 | Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Video #7: Visiting and filming the department store | Plan: Extra idea (if time opens up) — backup — Grown-up beauties that tolerate a toddler — 9th arr. | Rick Steves: Admiring the belle époque dome", "review": "Video #7: Probably the most famous department store in France, over 120 years old; started as a 70 m2 shop and is now a palace selling the best brands, visited by 36 million people a year. Famous Art Nouveau glass dome built in 1912 (the staircase beneath it was removed in 1974). A glass walkway opened in late 2023 to get up close to the dome: entry is completely free but must be reserved on the website. On weekends there are also historical tours sold on the store's website. The rooftop terrace is free and offers great views of Paris, but it was closed during his visit. | Plan: Free rooftop panorama over the opera house, the art-nouveau dome inside, and a serious toy floor on the way down. | Rick Steves: Department stores were invented in Paris — the first to offer the convenience and efficiency of a variety of small shops under one roof. The Galeries Lafayette's centerpiece is its belle époque dome from 1912, an unforgettable example of Art Nouveau and a hit with shoppers.", "url": "https://www.google.com/maps/search/?api=1&query=48.87362,2.33211", "category": "Shopping & Services", "olympics": "No", "source": "Both", "lat": 48.87362, "lon": 2.33211}, {"name": "La Samaritaine", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Visiting and filming the department store", "review": "Department store celebrating 150 years; it was closed for 16 years for remodeling and safety reasons and reopened in 2021 after an extensive and controversial renovation. Now listed as a historic building and an excellent example of French Art Nouveau and Art Deco. More than 600 international brands sell here. He says it is worth visiting even if you don't buy anything. Located right across from the LV Dream exhibition.", "url": "https://www.google.com/maps/search/?api=1&query=La%20Samaritaine%2C%209%20Rue%20de%20la%20Monnaie%2C%20Paris", "category": "Shopping & Services", "olympics": "No", "source": "Video", "lat": 48.859206, "lon": 2.342353}, {"name": "LV Dream", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Visiting the Louis Vuitton exhibition, browsing the shop and eating a pastry at the cafe", "review": "Free exhibition telling the 160+ year history of Maison Louis Vuitton, a brand born for travel: trunks and travel bags, a revolutionary anti-theft lock, the trunks created for Wes Anderson's film The Darjeeling Limited (which he loved seeing), and recent collaborations with famous artists and designers. Entry is free but you must reserve your ticket on the website. The upstairs shop sells products including little-known LV travel guides (Rome, Madrid, Singapore, Marrakech, Beijing, Prague) in nice boxes. The cafe serves pastry creations by chef Maxime inspired by LV; he had the chocolate one - not cheap at 18 euros, but he found it really delicious.", "url": "https://www.google.com/maps/search/?api=1&query=LV%20Dream%2C%2026%20Quai%20de%20la%20M%C3%A9gisserie%2C%20Paris", "category": "Museums & Culture", "olympics": "No", "source": "Video", "lat": 48.8586, "lon": 2.3465}, {"name": "Fondation Louis Vuitton", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Video #7: Visiting the museum and filming (he has been twice) | Plan: Itinerary — see & do — Day 8 · Mon Sep 7 — 12:45", "review": "Video #7: Museum by multi-award-winning architect Frank Gehry, described as a transparent cloud floating in the Jardin d'Acclimatation: 13,500 m2 of glass partially covering 19,000 white reinforced-concrete panels, with 3,850 m2 of exhibition space in 11 galleries. If you're a fan of architecture, the building alone is worth the visit. Exhibitions change constantly; he has been twice and they never disappoint. A Rothko exhibition was on at the time and drawing big crowds - check the website to see which exhibition will be on when you go. | Plan: Frank Gehry's glass ship rises straight out of the trees next door — a 15-minute gawk and a café stop. The terraces are the show; the art can wait a decade.", "url": "https://www.google.com/maps/search/?api=1&query=48.87665,2.26352", "category": "Museums & Culture", "olympics": "No", "source": "Both", "lat": 48.87665, "lon": 2.26352}, {"name": "Le Train Bleu", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Eating lunch (tartare, salmon, baba au rhum) and filming", "review": "In his view one of the most beautiful restaurants in Paris - like eating in a palace. It is located inside a train station, so you can eat there before catching a train. You can order a la carte or set menus; his menu cost about 88 euros and included starter, main and dessert: a quite good tartare, a salmon main, and the house star dessert, baba au rhum (sponge cake with chantilly cream soaked in a rum syrup), included in the menu. Food is good, the place is spectacular, and service is excellent and fast. It is expensive, but he recommends it. Make sure to reserve - it is very, very popular.", "url": "https://www.google.com/maps/search/?api=1&query=Le%20Train%20Bleu%2C%20Gare%20de%20Lyon%2C%20Place%20Louis%20Armand%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8443, "lon": 2.3735}, {"name": "Cédric Grolet (boutique and cafe near the Opéra)", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Queuing to buy the famous \"cookie pizza\" and tasting it", "review": "Cedric Grolet is one of the most famous pastry chefs in the world (almost 10 million Instagram followers); his boutiques and cafes have gone viral. There is always a queue - worst early in the morning because his famous croissants sell out. Your options: reserve at the cafe (which he strongly recommends if you want to sit for breakfast and very expensive desserts), stand in line like he did, or order online for pickup at least 2 days in advance. The cookie pizza costs 35 euros whole (single flavor or mixed - he tried strawberry, peanut, pistachio, walnut and hazelnut); a newly opened cafe around the corner from the Opéra location sells it by the slice for 5 euros each. His honest verdict: the cookies are good but not extraordinary - he personally would not queue for them; online opinions are extremely polarized (people either love or hate them). He liked Patrick Roger's chocolates much more.", "url": "https://www.google.com/maps/search/?api=1&query=C%C3%A9dric%20Grolet%20Op%C3%A9ra%2C%2035%20Avenue%20de%20l%27Op%C3%A9ra%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.867957, "lon": 2.333196}, {"name": "Patrick Roger", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Recommended only (not visited on camera); buying and tasting chocolates", "review": "He says the Patrick Roger chocolates he posted on Instagram and TikTok pleased him much more than Cedric Grolet's viral cookies.", "url": "https://www.google.com/maps/search/?api=1&query=Patrick%20Roger%2C%203%20Place%20de%20la%20Madeleine%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8695, "lon": 2.3249}, {"name": "Ópera Garnier", "video": "París VIP ｜ Alan por el mundo París #7 | Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Touring the opera house and filming | Rick Steves: Touring the lobby and grand theater", "review": "For his taste, the most beautiful theater in the world. Built under Napoleon III by then-novice architect Charles Garnier, decorated with more than 30 marbles from around the world; the most expensive building of its time and one of the first opera houses with electric light; the Phantom of the Opera story was inspired here. Highlights: the grand staircase (one of the most beautiful in the world), the main hall with almost 2,000 red-upholstered seats, a ceiling painted by Chagall and an impressive chandelier (the auditorium is not always open due to rehearsals and stage setups), and the dazzling Grand Foyer - the single room in Paris he would choose above all. Due to facade renovation, the balcony is currently closed and the Grand Foyer is lit artificially. Tips: dedicate at least two hours; the ideal is to attend an opera or ballet performance - tickets are sold on the website but sell out; otherwise take a guided visit, or walk freely with the audioguides available. It is very popular and crowded, so buy tickets in advance to secure your spot and avoid the long queue (tickets are also sold on site). | Rick Steves: The stately opera house's lobby is as big as the auditorium itself — an elegant showcase in which to see and be seen. A dazzling hall, just right for sipping champagne, leads into the grand theater, famously crowned with a wondrous ceiling by Marc Chagall.", "url": "https://www.google.com/maps/search/?api=1&query=Palais%20Garnier%2C%20Place%20de%20l%27Op%C3%A9ra%2C%20Paris", "category": "Entertainment & Events", "olympics": "No", "source": "Video", "lat": 48.871433, "lon": 2.331965}, {"name": "The Lobby (restaurant at the Hôtel Peninsula)", "video": "París VIP ｜ Alan por el mundo París #7", "activity": "Eating his farewell dinner; also had his breakfasts there during the stay", "review": "Every Peninsula hotel has a restaurant called The Lobby, in the hotel lobby; you can have breakfast, lunch and dinner there. His farewell dinner: a delicious vegetable soup served very theatrically, a delicious lobster linguine with a saffron cloud, and for dessert a chocolate tart with edible gold and salted-caramel ice cream. He found everything triumphant and very good.", "url": "https://www.google.com/maps/search/?api=1&query=The%20Lobby%2C%20The%20Peninsula%20Paris%2C%2019%20Avenue%20Kl%C3%A9ber%2C%20Paris", "category": "Food & Drink", "olympics": "No", "source": "Video", "lat": 48.8711, "lon": 2.2934}, {"name": "Land at CDG", "video": "", "activity": "Itinerary — transit — Day 1 · Mon Aug 31 | Fly home · Sat Sep 12 — ~09:30 | 08:30", "review": "Passports + bags ≈ 60–75 min. Your pre-booked family driver waits at arrivals with the toddler seat installed. Tip: Backup: official taxi rank — flat €65 to the Left Bank, luggage and tolls included (taxis are legally exempt from the car-seat rule).", "url": "https://www.google.com/maps/search/?api=1&query=49.00969,2.54785", "category": "Transit & Walks", "olympics": "No", "source": "Plan", "lat": 49.00969, "lon": 2.54785}, {"name": "Citadines Saint-Germain-des-Prés", "video": "", "activity": "Plan: Itinerary — stay — Day 1 · Mon Aug 31 | Day 2 · Tue Sep 1 | Day 3 · Wed Sep 2 | Day 5 · Fri Sep 4 | Day 6 · Sat Sep 5 | Day 8 · Mon Sep 7 | Day 11 · Thu Sep 10 | Day 12 · Fri Sep 11 — 11:00 | 20:00 | 15:00 | 13:45 | 16:45 | 13:45 | 11:45 | 13:00 | Plan: Hotel — Paris — Top pick — Aparthotel 4★ · 6th arr. — on the Seine, facing the Île de la Cité — ≈ €260–400/nt", "review": "Plan: Rooms are rarely ready before 14:00; they'll store everything. Splash faces, change her, and get straight back into daylight — it's the cure. Tip: Ask now: cot set-up, courtyard-side room, and bag storage for the Disney nights. | Plan: The itinerary in this guide is built from its front door. Book the 1-bedroom if available; the studio works too. Tip: Pros: 1-bedroom apartments: a real door between her bedtime and your evening · Kitchenette + in-building laundry — the toddler trifecta · Unbeatable base: Notre-Dame 8 min, Louvre 15, Luxembourg 12, all on foot · Calm, safe, café-lined corner of the Left Bank / Cons: Functional décor, not a love-letter to Paris · Quai-side rooms hear traffic — ask for courtyard/upper floor · Books out early for September; breakfast is basic · A few recent reviews flag AC/maintenance hiccups — confirm an air-conditioned, recently serviced apartment when booking", "url": "https://www.google.com/maps/search/?api=1&query=48.85551,2.34086", "category": "Hotels", "olympics": "No", "source": "Plan", "lat": 48.85551, "lon": 2.34086}, {"name": "Brasserie des Prés", "video": "", "activity": "Plan: Itinerary — eat — Day 1 · Mon Aug 31 | Day 6 · Sat Sep 5 | Day 8 · Mon Sep 7 — 12:00 | 18:30 | 19:00 | Plan: Restaurant — €€ — Saint-Germain & Latin Quarter — home turf, most evenings", "review": "Plan: All-day brasserie in the cobbled Cour du Commerce Saint-André. Roast chicken to share, a carafe of something cold for the pilots of this operation. Tip: Toast: half the trip done — the mouse-shaped half to go. | Plan: Comfort classics done properly, open 9:00–midnight every single day, two minutes from the base hotel. You'll be back. Tip: Bookable online; ask for the courtyard end.", "url": "https://www.google.com/maps/search/?api=1&query=48.85295,2.3392", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85295, "lon": 2.3392}, {"name": "Jardin du Luxembourg", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Relaxing in the gardens and watching the toy sailboats on the pond | Plan: Itinerary — see & do — Day 1 · Mon Aug 31 | Day 7 · Sun Sep 6 | Day 12 · Fri Sep 11 — 14:30 | 11:15 | 16:00 | Plan: Itinerary — eat — Day 7 · Sun Sep 6 — 12:30", "review": "Rick Steves: A tranquility and refined orderliness enjoyed by young and old alike. The gardens are impeccably tended, and for generations children have launched dreams on this pond. | Plan: The great Paris toddler garden: the 1879 carousel with the ring-catching game, a big fenced playground (small fee), pony rides on their seasonal schedule, green chairs by the pond for you. Tip: Toy sailboats rent at the central pond on fine afternoons — a few euros of pure joy. | Plan: Green chairs by the pond, the crêpe kiosk inside the park, or provisions carried in from rue de Buci.", "url": "https://www.google.com/maps/search/?api=1&query=48.8461,2.33389", "category": "Parks & Nature", "olympics": "No", "source": "Both", "lat": 48.8461, "lon": 2.33389}, {"name": "Bouillon Racine", "video": "", "activity": "Plan: Itinerary — eat — Day 1 · Mon Aug 31 — 18:00 | Plan: Restaurant — €–€€ — Saint-Germain & Latin Quarter — home turf, most evenings", "review": "Plan: A 1906 Art-Nouveau dining room doing French classics at gentle prices, serving from opening — the perfect first-night France. | Plan: An Art-Nouveau jewel box (1906) serving blanquette and confit at bouillon prices — dinner in a museum you're allowed to drop crumbs in. Tip: Book; gorgeous at the early seating.", "url": "https://www.google.com/maps/search/?api=1&query=48.85018,2.34202", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85018, "lon": 2.34202}, {"name": "Square du Vert-Galant (Pont Neuf)", "video": "", "activity": "Itinerary — see & do — Day 1 · Mon Aug 31 | Day 12 · Fri Sep 11 — 19:30 | 11:30", "review": "Paris's oldest bridge for the first proper 'we're actually here' view — then home, bath, lights out. Tip: Weekday late morning = you'll get a bench. Hold hands near the low edges.", "url": "https://www.google.com/maps/search/?api=1&query=48.85749,2.34017", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.85749, "lon": 2.34017}, {"name": "Le Petit Cler", "video": "", "activity": "Plan: Itinerary — eat — Day 2 · Tue Sep 1 | Day 12 · Fri Sep 11 — 12:15 | 19:00 | Plan: Restaurant — € — Near the Eiffel Tower (7th) — days 2 & 12", "review": "Plan: Paris's friendliest market street: rotisserie chicken, cheese, fruit, baguette. Haul it back to the lawns — or surrender to Le Petit Cler's terrace if legs are done. Tip: Too tired? Skip the sparkle. You're a 7-hour flight away; you'll be back. | Plan: All-day café on the rue Cler market street: omelettes, croques, terrace with stroller parking. Your picnic-supply HQ too. Tip: Continuous service — the toddler-hour safety net.", "url": "https://www.google.com/maps/search/?api=1&query=48.85745,2.3062", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85745, "lon": 2.3062}, {"name": "Seine cruise — Vedettes de Paris", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Taking a touristic cruise up and down the Seine for a relaxing overview of the city | Plan: Itinerary — see & do — Day 2 · Tue Sep 1 — 15:30", "review": "Rick Steves: Boats go all the time and come with a light narration (he takes a generic tourist cruise; no operator named). The Seine is the lifeblood of Paris — cargo boats powering from the Atlantic deep into France, and tourists enamored with the parade of Parisian landmarks. The bridges, bestowed on the city by kings and emperors over the centuries, tell a story: 'N' means thanks to Napoleon. At night, sightseeing boats enliven the river and its sparkling bridges. | Plan: One easy hour on the water from the Tower's own dock: Notre-Dame, Orsay, every bridge — the whole-city introduction with zero walking. Little-kid tickets cost a few euros. Tip: Sit outside; the Tower shot is on the left leaving the dock.", "url": "https://www.google.com/maps/search/?api=1&query=48.85875,2.29189", "category": "Entertainment & Events", "olympics": "No", "source": "Both", "lat": 48.85875, "lon": 2.29189}, {"name": "La Fontaine de Mars", "video": "", "activity": "Plan: Itinerary — eat — Day 2 · Tue Sep 1 — 19:00 | Plan: Restaurant — €€€ — Near the Eiffel Tower (7th) — days 2 & 12", "review": "Plan: The classic pink-tableclothed bistro 300 m from the Tower: duck confit, île flottante, old-school warmth toward children since 1908. Doors at 19:00 — book the first seating and the room is calm and yours at toddler hour. | Plan: Pink-checked, arcaded, old-school Southwest French — duck confit, île flottante. The 'nice dinner' that still loves children. Tip: Book the 19:00 seating a week or two out.", "url": "https://www.google.com/maps/search/?api=1&query=48.8584,2.30255", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.8584, "lon": 2.30255}, {"name": "Angelina (rue de Rivoli)", "video": "", "activity": "Plan: Itinerary — eat — Day 3 · Wed Sep 2 — 12:15 | Plan: Restaurant — €€ — Louvre · Opéra · Grands Boulevards — day 3", "review": "Plan: Since 1903: split a chocolat chaud l'Africain and a Mont Blanc; add a croque if you want real lunch. She gets whipped cream and a memory. | Plan: The 1903 tearoom by the Tuileries. You're here for the 'l'Africain' hot chocolate and a Mont Blanc, not a meal. Tip: Before 12:30 the line is short; the takeaway counter fixes emergencies.", "url": "https://www.google.com/maps/search/?api=1&query=48.86509,2.32844", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.86509, "lon": 2.32844}, {"name": "Stroller nap — Palais-Royal & Galerie Vivienne", "video": "", "activity": "Itinerary — nap — Day 3 · Wed Sep 2 — 13:15", "review": "Glide through the Palais-Royal garden, Buren's striped columns, then the glass-roofed Galerie Vivienne — Paris's prettiest (and rain-proof) nap circuit.", "url": "https://www.google.com/maps/search/?api=1&query=48.86497,2.33781", "category": "Transit & Walks", "olympics": "No", "source": "Plan", "lat": 48.86497, "lon": 2.33781}, {"name": "Bouillon Chartier (Grands Boulevards)", "video": "", "activity": "Plan: Itinerary — eat — Day 3 · Wed Sep 2 — 17:45 | Plan: Restaurant — € — Louvre · Opéra · Grands Boulevards — day 3", "review": "Plan: The listed 1896 hall: 2,000 covers a day, bills tallied on the paper tablecloth, mains from a few euros — and a roar that swallows toddler noise whole. No bookings; 17:45 walks straight in. Tip: Celeri rémoulade → roast chicken-frites → profiteroles. In and out in an hour. | Plan: A listed 1896 hall serving 2,000 covers a day; waiters add up the bill on your paper tablecloth. Loud, fast, joyful, absurdly cheap — the noise swallows toddlers whole. Tip: No bookings; walk in at 17:45 and skip the queue entirely.", "url": "https://www.google.com/maps/search/?api=1&query=48.87192,2.34303", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.87192, "lon": 2.34303}, {"name": "Notre-Dame de Paris", "video": "Paris of the Parisians ｜ Rick Steves' Europe", "activity": "Rick Steves: Visiting the cathedral and admiring it again floodlit at night | Plan: Itinerary — see & do — Day 4 · Thu Sep 3 — 09:00", "review": "Rick Steves: Ground was broken in 1163 on a building that wouldn't be finished for 200 years, built on the Île de la Cité upon the ruins of a Roman temple. Gothic architects used the latest technology — flying buttresses — to support the heavy rooftop, and the ghoulish gargoyles multitask as fancy rain spouts that scare away evil spirits. Dedicated to 'Our Lady' (Notre Dame): Mary cradles the baby Jesus while the rose window provides a majestic halo. Heroically rebuilt and looking brand-new after the tragic 2019 fire, it's as much as ever a beacon of hope for the City of Light — and particularly dramatic after dark. | Plan: Gloriously reopened — the blond stone practically glows. Entry is free; reserve the timed slot on the official site (only released 0–2 days ahead) or join the moving line early. 30–45 minutes is plenty with small legs. Tip: Square Jean-XXIII behind the apse: the flying-buttress postcard view + room to run.", "url": "https://www.google.com/maps/search/?api=1&query=48.85297,2.3499", "category": "Landmarks & Areas", "olympics": "No", "source": "Both", "lat": 48.85297, "lon": 2.3499}, {"name": "Berthillon (Île Saint-Louis)", "video": "", "activity": "Plan: Itinerary — eat — Day 4 · Thu Sep 3 — 10:30 | Plan: Restaurant — € — Le Marais & the Islands — days 4 & 7", "review": "Plan: The island stroll every Parisian prescribes, capped with the city's most famous scoop. (Flagship sometimes still on summer break in early Sept — the island's other shops carry it.) Tip: Salted caramel. Trust. | Plan: France's most famous ice cream, on the island made for eating it. Tip: Flagship often on summer closure till early Sept — nearby île shops scoop it too.", "url": "https://www.google.com/maps/search/?api=1&query=48.85171,2.35672", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85171, "lon": 2.35672}, {"name": "Stroller nap — the bouquiniste mile", "video": "", "activity": "Itinerary — nap — Day 4 · Thu Sep 3 — 12:45", "review": "Recline and roll upriver: book-stalls, barges, plane-tree shade, all the way to the botanical garden.", "url": "https://www.google.com/maps/search/?api=1&query=48.85038,2.35365", "category": "Transit & Walks", "olympics": "No", "source": "Plan", "lat": 48.85038, "lon": 2.35365}, {"name": "Jardin des Plantes + the Ménagerie", "video": "", "activity": "Itinerary — see & do — Day 4 · Thu Sep 3 — 14:45", "review": "A 1794 zoo built at toddler scale: red pandas, wallabies, flamingos, orangutans in 90 unhurried minutes. Outside: a dinosaur carousel and a playground in the botanical alleys. Tip: ≈€14/adult, free under 3. Rainy-day swap: the Grande Galerie de l'Évolution's animal parade next door.", "url": "https://www.google.com/maps/search/?api=1&query=48.84428,2.36045", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.84428, "lon": 2.36045}, {"name": "Le Relais de l'Entrecôte", "video": "", "activity": "Plan: Itinerary — eat — Day 4 · Thu Sep 3 — 18:30 | Plan: Restaurant — €€ — Saint-Germain & Latin Quarter — home turf, most evenings", "review": "Plan: One decision only: how you like your steak. Salad, then steak-frites in the famous sauce — seconds included — served at speed. Doors at 18:30 (verified) — arrive at opening and walk straight in. | Plan: One menu: salad, then steak-frites in the secret sauce — with seconds. Zero decisions, fast turnover, kids are furniture here. Tip: Doors at 18:30 — arrive at opening and walk straight in.", "url": "https://www.google.com/maps/search/?api=1&query=48.85464,2.33273", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85464, "lon": 2.33273}, {"name": "The funicular up", "video": "", "activity": "Itinerary — see & do — Day 5 · Fri Sep 4 — 09:00", "review": "The little cliff-railway is a ride in itself — standard €2.55 ticket, she's free — and spares you 197 steps.", "url": "https://www.google.com/maps/search/?api=1&query=48.8847,2.34266", "category": "Transit & Walks", "olympics": "No", "source": "Plan", "lat": 48.8847, "lon": 2.34266}, {"name": "Pink Mamma", "video": "", "activity": "Plan: Itinerary — eat — Day 5 · Fri Sep 4 — 12:00 | Plan: Restaurant — €€ — Montmartre & Pigalle — day 5", "review": "Plan: Four exuberant floors of Italian under a rooftop greenhouse: truffle pasta, wood-fired pizza, pure theatre she'll approve of. Lunch with a toddler here is easy; dinner is a scene. Tip: Couldn't book? Bouillon Pigalle around the corner seats fast. | Plan: Four exuberant floors of Italian under a rooftop greenhouse — truffle pasta, wood-fired pizza, pure theatre a toddler appreciates. Tip: Book the 12:00 lunch online well ahead; dinners are a scene.", "url": "https://www.google.com/maps/search/?api=1&query=48.88195,2.33453", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.88195, "lon": 2.33453}, {"name": "La Grande Épicerie + Square Boucicaut", "video": "", "activity": "Itinerary — see & do — Day 5 · Fri Sep 4 — 16:30", "review": "Bon Marché's legendary food hall (edible souvenirs; the candy wall) then the little playground square opposite. Zero ambition, high pleasure.", "url": "https://www.google.com/maps/search/?api=1&query=48.8503,2.32401", "category": "Shopping & Services", "olympics": "No", "source": "Plan", "lat": 48.8503, "lon": 2.32401}, {"name": "Crêpe dinner — Breizh Café Odéon", "video": "", "activity": "Itinerary — eat — Day 5 · Fri Sep 4 — 18:00", "review": "Buckwheat galettes for you, ham-and-cheese crêpe plus salted-caramel finale for her. Continuous service, bookable, three minutes from bed.", "url": "https://www.google.com/maps/search/?api=1&query=48.85163,2.33882", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85163, "lon": 2.33882}, {"name": "Palace at opening — the 45-minute hit", "video": "", "activity": "Itinerary — see & do — Day 6 · Sat Sep 5 — 09:00", "review": "With the Passport's timed 09:00 entry you sweep the State Apartments and Hall of Mirrors before the tour buses, then hand the day to the outdoors. Under-6s are free across the whole estate. Tip: Palace optional! The gardens-only fountain ticket (≈€11) is a perfect day by itself.", "url": "https://www.google.com/maps/search/?api=1&query=48.80486,2.12036", "category": "Landmarks & Areas", "olympics": "No", "source": "Plan", "lat": 48.80486, "lon": 2.12036}, {"name": "Gardens & Musical Fountains", "video": "", "activity": "Itinerary — see & do — Day 6 · Sat Sep 5 — 10:15", "review": "The groves open, the water flies, baroque music everywhere (fountains typically play late morning + mid-afternoon; music all day). The Mirror Fountain finale draws applause from the under-3 demographic.", "url": "https://www.google.com/maps/search/?api=1&query=48.80549,2.1177", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.80549, "lon": 2.1177}, {"name": "Picnic by the Grand Canal + a rowboat", "video": "", "activity": "Itinerary — eat — Day 6 · Sat Sep 5 — 12:15", "review": "Picnics are welcome along the canal in the park (not the formal parterres); kiosks and La Petite Venise back you up. Then rent a rowboat on the Sun King's canal — the trip's sleeper-hit memory. Tip: Bring the picnic from Paris, or grab it at the market hall near Versailles station.", "url": "https://www.google.com/maps/search/?api=1&query=48.80879,2.1109", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.80879, "lon": 2.1109}, {"name": "The Queen's Hamlet — Marie-Antoinette's farm", "video": "", "activity": "Itinerary — see & do — Day 6 · Sat Sep 5 — 13:45", "review": "A storybook village with real goats, sheep, donkeys and a dovecote — unbeatable toddler-per-metre value. She wakes up to animals. Tip: The Trianon estate (Hamlet included) opens at noon — exactly why it's the after-lunch stop.", "url": "https://www.google.com/maps/search/?api=1&query=48.81927,2.1131", "category": "Parks & Nature", "olympics": "No", "source": "Plan", "lat": 48.81927, "lon": 2.1131}, {"name": "Musée d'Orsay — free first Sunday", "video": "", "activity": "Itinerary — see & do — Day 7 · Sun Sep 6 — 09:30", "review": "Straight to level 5: Monet, Renoir, Van Gogh — and the giant station clock she can wave through at the whole city. 60–90 minutes max; strollers fine. Tip: Everyone needs the booked €0 slot now, even for free entry. Missed it? A €16 ticket another morning beats fighting the crowd.", "url": "https://www.google.com/maps/search/?api=1&query=48.85996,2.32656", "category": "Museums & Culture", "olympics": "No", "source": "Plan", "lat": 48.85996, "lon": 2.32656}, {"name": "Chez Janou", "video": "", "activity": "Plan: Itinerary — eat — Day 7 · Sun Sep 6 — 19:00 | Plan: Restaurant — €€ — Le Marais & the Islands — days 4 & 7", "review": "Plan: Provençal bistro two steps off the square, famous for the help-yourself chocolate-mousse bowl that will re-wire her understanding of dessert. Book the opening seating — or swap in Breizh Café Marais for continuous service. | Plan: Provençal charmer behind the Place des Vosges; the help-yourself chocolate-mousse bowl is a rite of passage. Tip: Open all day and gone viral — book well ahead, or queue at the noon opening.", "url": "https://www.google.com/maps/search/?api=1&query=48.85672,2.3672", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85672, "lon": 2.3672}, {"name": "Jardin d'Acclimatation", "video": "", "activity": "Itinerary — see & do — Day 8 · Mon Sep 7 — 10:00", "review": "Carousels and small rides sized exactly for two-year-olds, a working farm, aviary, splash streams and endless playgrounds. Entry ≈€7 + rides by wristband or tickets; casual lunch inside. Tip: The old-fashioned Fête au Bois de Boulogne funfair also runs in the Bois this month — Ferris-wheel finale if dates align.", "url": "https://www.google.com/maps/search/?api=1&query=48.87778,2.26976", "category": "Entertainment & Events", "olympics": "No", "source": "Plan", "lat": 48.87778, "lon": 2.26976}, {"name": "RER A → Marne-la-Vallée–Chessy", "video": "", "activity": "Itinerary — transit — Day 9 · Tue Sep 8 — 08:45", "review": "Direct double-decker train, ~40 min, €2.55 each (she's free) — and the station doors open 200 m from the park gates. Door-to-door taxi alternative: ~€85–100. Tip: Sit up top at the front. 'We're going to see MICKEY' energy management begins now.", "url": "https://www.google.com/maps/search/?api=1&query=48.8443,2.37438", "category": "Transit & Walks", "olympics": "No", "source": "Plan", "lat": 48.8443, "lon": 2.37438}, {"name": "Disney Sequoia Lodge", "video": "", "activity": "Plan: Itinerary — stay — Day 9 · Tue Sep 8 | Day 9 · Tue Sep 8 | Day 10 · Wed Sep 9 — 10:00 | 13:30 | 14:00 | Plan: Hotel — Disneyland — Our pick — 3★+ · lakeside, 12–15 min walk to both parks — pkg ≈ €450–650/nt*", "review": "Plan: Rooms open mid-afternoon; luggage service holds everything while your keys activate the perks — 2-park tickets, tomorrow's early entry, the lakeside path to the gates. Tip: Under-3s need no ticket and eat free at the hotel buffets. | Plan: *Package = room + 2-day/2-park tickets for 2 adults; under-3s stay, enter and eat (buffets) free. This is the one that makes Disney work with a napper. Tip: Pros: Indoor pool with kids' slide → the legendary midday nap-and-swim reset · Cosy national-park-lodge theming; calm after the parks · Best value-for-experience in most recent rankings / Cons: A 2026 room-refresh is underway — some areas may be in works (ask when booking) · Un-renovated rooms show their age · Breakfast rush is real; book a slot", "url": "https://www.google.com/maps/search/?api=1&query=48.86866,2.79022", "category": "Hotels", "olympics": "No", "source": "Plan", "lat": 48.86866, "lon": 2.79022}, {"name": "Disneyland Park", "video": "", "activity": "Itinerary — see & do — Day 9 · Tue Sep 8 | Day 9 · Tue Sep 8 | Day 10 · Wed Sep 9 — 10:45 | 16:30 | 16:30", "review": "Her list writes itself: Lancelot's Carousel, Dumbo, Peter Pan's Flight, the teacups, Casey Jr. and the Storybook canal boats, it's a small world on loop, Meet Mickey. On a quiet Tuesday you'll clear it without running. Tip: DLP app for live waits; 'rider switch' lets you two alternate on anything she can't board.", "url": "https://www.google.com/maps/search/?api=1&query=48.87105,2.7788", "category": "Entertainment & Events", "olympics": "No", "source": "Plan", "lat": 48.87105, "lon": 2.7788}, {"name": "Disney Village", "video": "", "activity": "Plan: Itinerary — eat — Day 9 · Tue Sep 8 | Day 10 · Wed Sep 9 — 18:30 | 18:30 | Plan: Restaurant — € — At Disneyland — days 9 & 10", "review": "Plan: Hunter's Grill buffet at the Lodge (she eats free) is the zero-effort play; Disney Village has Vapiano / Earl of Sandwich for a 'chains are fine tonight' night. | Plan: Earl of Sandwich, Vapiano, Five Guys, Annette's Diner milkshakes — for the 'chains are fine occasionally' clause in your brief. Tip: Open late; useful the night you arrive.", "url": "https://www.google.com/maps/search/?api=1&query=48.86927,2.78471", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.86927, "lon": 2.78471}, {"name": "World of Frozen at rope drop", "video": "", "activity": "Itinerary — see & do — Day 10 · Wed Sep 9 — 08:30", "review": "Arendelle under the mountain: the Frozen boat ride, Anna & Elsa meets, the village square. Early entry exists exactly for this — do it first, do it twice. Tip: The new land is why 2026 crowds run hot; your post-rentrée Wednesday + early entry is the counter-move.", "url": "https://www.google.com/maps/search/?api=1&query=48.86413,2.77365", "category": "Entertainment & Events", "olympics": "No", "source": "Plan", "lat": 48.86413, "lon": 2.77365}, {"name": "Toy Story Playland + Cars Road Trip", "video": "", "activity": "Itinerary — see & do — Day 10 · Wed Sep 9 — 10:30", "review": "Slinky Dog, flying carpets, the Cars drive — the gentle-thrills wing. Ratatouille's 4D chase is nearby if she's feeling brave (dark, but slow).", "url": "https://www.google.com/maps/search/?api=1&query=48.86693,2.77704", "category": "Entertainment & Events", "olympics": "No", "source": "Plan", "lat": 48.86693, "lon": 2.77704}, {"name": "Bistrot Chez Rémy", "video": "", "activity": "Plan: Itinerary — eat — Day 10 · Wed Sep 9 — 12:30 | Plan: Restaurant — €€€ — At Disneyland — days 9 & 10", "review": "Plan: You're shrunk to rat size — jar-lid chairs under fairy-lit rooftops — with table-service steak-frites. The theming outshines the plates; that's the deal, and once is absolutely worth it. | Plan: You're shrunk to rat size — jar-lid chairs, cocktail-umbrella décor — with real table-service steak-frites. The one Disney meal worth planning. Tip: Reservations open ~2 months ahead — book the day-10 lunch now. You're paying for the room more than the plates, and the room delivers.", "url": "https://www.google.com/maps/search/?api=1&query=48.86738,2.77601", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.86  Enormous — long corridors, busy lobby · Meaningfully pricier than Sequoia for a similar walk", "url": "https://www.google.com/maps/search/?api=1&query=48.86546,2.78929", "category": "Hotels", "olympics": "No", "source": "Plan", "lat": 48.86546, "lon": 2.78929}, {"name": "Disney Hotel New York – The Art of Marvel", "video": "", "activity": "Hotel — Disneyland — Sleek — 4★+ · 10 min walk, pool + spa — pkg ≈ €650–900/nt", "review": "Skip at this age — the theming won't land for her. Tip: Pros: Closest after the Disneyland Hotel; slick rooms, great pool · Superhero meet-and-greets / Cons: Marvel is wasted on a 2½-year-old · City-hotel vibe, not storybook", "url": "https://www.google.com/maps/search/?api=1&query=48.87075,2.7877", "category": "Hotels", "olympics": "No", "source": "Plan", "lat": 48.87075, "lon": 2.7877}, {"name": "Disneyland Hotel", "video": "", "activity": "Hotel — Disneyland — Grand splurge — 5★ · literally above the park gates — pkg ≈ €1,100–1,800/nt", "review": "File under 'maybe when she's five and will remember it'. Tip: Pros: Royal-princess palace, characters at breakfast, zero commute · The full once-in-a-childhood fantasy / Cons: Costs more per night than three nights at Sequoia", "url": "https://www.google.com/maps/search/?api=1&query=48.87041,2.77971", "category": "Hotels", "olympics": "No", "source": "Plan", "lat": 48.87041, "lon": 2.77971}, {"name": "Café du Marché", "video": "", "activity": "Restaurant — € — Near the Eiffel Tower (7th) — days 2 & 12", "review": "The all-day corner standby of the rue Cler market street — bistro plates from 7:00 to midnight, terrace theatre included. Useful more than transcendent, and never fazed by small guests. Tip: No booking needed; continuous service is the toddler-hour superpower.", "url": "https://www.google.com/maps/search/?api=1&query=48.85667,2.30633", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85667, "lon": 2.30633}, {"name": "Breizh Café (Marais)", "video": "", "activity": "Restaurant — €€ — Le Marais & the Islands — days 4 & 7", "review": "Widely called the best crêperie in Paris: organic buckwheat galettes for you, ham-cheese crêpe + salted caramel for her. Multiple branches, all reservable. Tip: The Odéon branch is 3 min from the base hotel — your default dinner.", "url": "https://www.google.com/maps/search/?api=1&query=48.86062,2.36181", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.86062, "lon": 2.36181}, {"name": "Marché des Enfants Rouges", "video": "", "activity": "Restaurant — € — Le Marais & the Islands — days 4 & 7", "review": "Paris's oldest covered market (1615): Moroccan tagines, Japanese bento, Lebanese, crêpes — everyone eats what they want, stroller rolls right in. Tip: Lunch only, closed Mondays.", "url": "https://www.google.com/maps/search/?api=1&query=48.86287,2.36204", "category": "Shopping & Services", "olympics": "No", "source": "Plan", "lat": 48.86287, "lon": 2.36204}, {"name": "Little Breizh", "video": "", "activity": "Restaurant — € — Saint-Germain & Latin Quarter — home turf, most evenings", "review": "Tiny, beloved crêperie on rue Grégoire de Tours — the cosy alternative when Breizh Café is booked. Tip: Handful of tables — go early or reserve. Closed Sun & Mon.", "url": "https://www.google.com/maps/search/?api=1&query=48.85322,2.33795", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.85322, "lon": 2.33795}, {"name": "Bouillon Pigalle", "video": "", "activity": "Restaurant — € — Montmartre & Pigalle — day 5", "review": "The modern bouillon at the foot of the hill: French standards, tiny prices, big room. Tip: The no-booking fallback if Pink Mamma is full.", "url": "https://www.google.com/maps/search/?api=1&query=48.88262,2.33742", "category": "Food & Drink", "olympics": "No", "source": "Plan", "lat": 48.88262, "lon": 2.33742}, {"name": "Hotel buffets (Hunter's Grill etc.)", "video": "", "activity": "Restaurant — €€ — At Disneyland — days 9 & 10", "r
